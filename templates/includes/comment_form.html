{% load crispy_forms_filters %}

{% if user.is_authenticated %}
      <form method="POST" action="">
        {% csrf_token %}
        <div class="pink-form">
          {{ form|crispy }}
        </div>

        <div class="text-right mt-4">
          <button
              type="submit"
              class="btn my-logout-btn px-4 py-2 rounded-pill shadow-sm">
            Submit
          </button>
        </div>
      </form>

{% else %}
    <p class="lead mb-3 text-secondary">
      Please log in to join the discussion!
    </p>

    <a
        href="{% url 'login' %}"
        class="btn my-logout-btn px-4 py-2 rounded-pill shadow-sm">
      Login
    </a>
  </div>
{% endif %}
